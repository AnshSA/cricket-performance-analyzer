<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Performance Entry</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>🏏 Player Performance Entry</h1>
</header>


<main>

<form>

    <label>Player Name</label>
    <input type="text" placeholder="Enter player name">


    <label>Ground Played</label>

    <select>

        <option>Shree Cricket Mandir</option>

        <option>Unique Cricket Ground</option>

        <option>Mitrea Astro Turf</option>

    </select>


    <h2>🏏 Batting Statistics</h2>


    <label>Total Runs</label>
    <input type="number">


    <label>Total Balls Faced</label>
    <input type="number">


    <label>Balls Faced Against Pacers</label>
    <input type="number">


    <label>Balls Faced Against Spinners</label>
    <input type="number">


    <label>Bowler Type Faced Most</label>

    <select>

        <option>Pacer</option>

        <option>Spinner</option>

        <option>Both</option>

    </select>



    <h2>🎯 Bowling Statistics</h2>


    <label>Total Balls Bowled</label>
    <input type="number">


    <label>Balls Bowled as Pacer</label>
    <input type="number">


    <label>Balls Bowled as Spinner</label>
    <input type="number">


    <label>Bowling Style</label>

    <select>

        <option>Fast Bowler</option>

        <option>Medium Pace</option>

        <option>Off Spinner</option>

        <option>Leg Spinner</option>

    </select>



    <button type="submit">
        Save Performance
    </button>


</form>


</main>


</body>

</html>
